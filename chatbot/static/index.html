<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackvue Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px;
    }

    #container {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    #alerts-panel {
      width: 320px;
      height: 90vh;
      background: #16213e;
      border-radius: 12px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    #alerts-header {
      background: #e94560;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #reset-alerts {
      background: white;
      color: #e94560;
      border: none;
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: bold;
    }

    #reset-alerts:hover { background: #f0f0f0; }

    #alerts-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .alert-card {
      background: #1a1a2e;
      border: 1px solid #e94560;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .alert-card .plate {
      font-size: 1rem;
      font-weight: bold;
      color: #e94560;
      margin-bottom: 4px;
    }

    .alert-card .info { color: #aaa; }

    #alerts-empty {
      text-align: center;
      color: #555;
      margin-top: 40px;
      font-size: 0.9rem;
    }

    #header {
      background: #0f3460;
      padding: 16px 20px;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #header span { color: #e94560; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
    }

    .bot p { margin-bottom: 8px; }
    .bot p:last-child { margin-bottom: 0; }
    .bot ol, .bot ul { padding-left: 20px; margin-bottom: 8px; }
    .bot li { margin-bottom: 4px; }
    .bot strong { color: #ffffff; }
    .bot table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 0.9rem; }
    .bot th, .bot td { border: 1px solid #0f3460; padding: 8px 12px; text-align: left; }
    .bot th { background: #0f3460; color: #ffffff; }

    .user {
      align-self: flex-end;
      background: #0f3460;
      border-bottom-right-radius: 2px;
    }

    .bot {
      align-self: flex-start;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-bottom-left-radius: 2px;
    }

    .alert {
      align-self: center;
      background: #e94560;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      text-align: center;
    }

    #input-area {
      display: flex;
      padding: 16px;
      gap: 10px;
      background: #0f3460;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
    }

    #send {
      padding: 12px 20px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: bold;
    }

    #send:hover { background: #c73652; }
    #send:disabled { background: #555; cursor: not-allowed; }

    #report-btn {
      padding: 8px 14px;
      background: transparent;
      color: #e94560;
      border: 1px solid #e94560;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    #report-btn:hover { background: #e94560; color: white; }

    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 24px;
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #modal h3 { color: #e94560; font-size: 1rem; }

    #modal input, #modal textarea {
      padding: 10px 14px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
    }

    #modal textarea { resize: vertical; min-height: 80px; }

    #modal .actions { display: flex; gap: 10px; justify-content: flex-end; }

    #modal .btn-cancel {
      padding: 10px 18px;
      background: transparent;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 8px;
      cursor: pointer;
    }

    #modal .btn-submit {
      padding: 10px 18px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="header">
      &#9679; <span>BLACK</span>VUE &mdash; Assistant sécurité
    </div>
    <div id="messages">
      <div class="message bot">Bonjour, je suis l'assistant Blackvue. Posez-moi une question sur une plaque ou une détection.</div>
    </div>
    <div id="input-area">
      <button id="report-btn">+ Signaler un vol</button>
      <input id="input" type="text" placeholder="Ex: Historique de la plaque AB-123-CD..." />
      <button id="send">Envoyer</button>
    </div>
  </div>

  <div id="alerts-panel">
    <div id="alerts-header">
      ALERTES VÉHICULES VOLÉS
      <button id="reset-alerts">Reset</button>
    </div>
    <div id="alerts-list">
      <div id="alerts-empty">Aucune alerte pour le moment.</div>
    </div>
  </div>

  <div id="modal-overlay">
    <div id="modal">
      <h3>Signaler un véhicule volé</h3>
      <input id="modal-plate" type="text" placeholder="Plaque d'immatriculation * (ex: AB-123-CD)" />
      <div id="modal-error" style="color:#e94560;font-size:0.85rem;display:none;"></div>
      <textarea id="modal-desc" placeholder="Description (optionnel) : marque, couleur..."></textarea>
      <div class="actions">
        <button class="btn-cancel" id="modal-cancel">Annuler</button>
        <button class="btn-submit" id="modal-submit">Signaler</button>
      </div>
    </div>
  </div>

  <script>
    const input    = document.getElementById('input');
    const sendBtn  = document.getElementById('send');
    const messages = document.getElementById('messages');
    let history    = [];  // réinitialisé à chaque rechargement de page

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      if (type === 'bot') {
        div.innerHTML = marked.parse(text);
      } else {
        div.textContent = text;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      sendBtn.disabled = true;

      try {
        const res  = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, history })
        });
        const data = await res.json();
        if (data.history) history = data.history;
        if (!res.ok) {
          addMessage(data.detail, 'alert');
        } else {
          addMessage(data.reply, 'bot');
        }
      } catch (e) {
        addMessage('Erreur de connexion au serveur.', 'alert');
      }

      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    // Panneau alertes
    const alertsList  = document.getElementById('alerts-list');
    const alertsEmpty = document.getElementById('alerts-empty');
    let since         = new Date().toISOString();

    function formatDate(iso) {
      return new Date(iso).toLocaleString('fr-FR');
    }

    async function refreshAlerts() {
      try {
        const res  = await fetch(`/alerts?since=${encodeURIComponent(since)}`);
        const data = await res.json();
        if (!data.alerts || data.alerts.length === 0) return;

        data.alerts.forEach(a => {
          alertsEmpty.style.display = 'none';
          const card = document.createElement('div');
          card.className = 'alert-card';
          card.innerHTML = `
            <div class="plate">${a.plate_number}</div>
            <div class="info">Vu le : ${formatDate(a.timestamp)}</div>
            <div class="info">Position : ${a.latitude}, ${a.longitude}</div>
            <div class="info">Appareil : ${a.device_id}</div>
            ${a.description ? `<div class="info">Description : ${a.description}</div>` : ''}
          `;
          alertsList.insertBefore(card, alertsList.firstChild);
        });

        // On utilise le timestamp de la BDD pour éviter les problèmes de timezone
        since = data.alerts[0].timestamp;
      } catch (e) {}
    }

    setInterval(refreshAlerts, 10000);

    document.getElementById('reset-alerts').addEventListener('click', () => {
      alertsList.querySelectorAll('.alert-card').forEach(c => c.remove());
      alertsEmpty.style.display = 'block';
    });

    // Modal signalement
    const overlay     = document.getElementById('modal-overlay');
    const modalPlate  = document.getElementById('modal-plate');
    const modalDesc   = document.getElementById('modal-desc');
    const modalError  = document.getElementById('modal-error');

    document.getElementById('report-btn').addEventListener('click', () => {
      modalPlate.value = '';
      modalDesc.value  = '';
      overlay.classList.add('open');
      modalPlate.focus();
    });

    document.getElementById('modal-cancel').addEventListener('click', () => {
      overlay.classList.remove('open');
      modalError.style.display = 'none';
    });

    document.getElementById('modal-submit').addEventListener('click', async () => {
      const plate = modalPlate.value.trim();
      modalError.style.display = 'none';
      if (!plate) {
        modalError.textContent = 'La plaque est obligatoire.';
        modalError.style.display = 'block';
        return;
      }

      try {
        const res  = await fetch('/report-stolen', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ plate, description: modalDesc.value.trim() || null })
        });
        const data = await res.json();
        if (res.ok) {
          overlay.classList.remove('open');
          addMessage(`Véhicule ${data.plate} signalé comme volé.`, 'alert');
        } else {
          modalError.textContent = data.detail;
          modalError.style.display = 'block';
        }
      } catch (e) {
        modalError.textContent = 'Erreur de connexion au serveur.';
        modalError.style.display = 'block';
      }
    });
  </script>
</body>
</html>
