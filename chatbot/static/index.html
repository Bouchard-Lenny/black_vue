<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackvue Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #container {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    #header {
      background: #0f3460;
      padding: 16px 20px;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #header span { color: #e94560; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
    }

    .bot p { margin-bottom: 8px; }
    .bot p:last-child { margin-bottom: 0; }
    .bot ol, .bot ul { padding-left: 20px; margin-bottom: 8px; }
    .bot li { margin-bottom: 4px; }
    .bot strong { color: #ffffff; }
    .bot table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 0.9rem; }
    .bot th, .bot td { border: 1px solid #0f3460; padding: 8px 12px; text-align: left; }
    .bot th { background: #0f3460; color: #ffffff; }

    .user {
      align-self: flex-end;
      background: #0f3460;
      border-bottom-right-radius: 2px;
    }

    .bot {
      align-self: flex-start;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-bottom-left-radius: 2px;
    }

    .alert {
      align-self: center;
      background: #e94560;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      text-align: center;
    }

    #input-area {
      display: flex;
      padding: 16px;
      gap: 10px;
      background: #0f3460;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
    }

    #send {
      padding: 12px 20px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: bold;
    }

    #send:hover { background: #c73652; }
    #send:disabled { background: #555; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="container">
    <div id="header">
      &#9679; <span>BLACK</span>VUE &mdash; Assistant sécurité
    </div>
    <div id="messages">
      <div class="message bot">Bonjour, je suis l'assistant Blackvue. Posez-moi une question sur une plaque ou une détection.</div>
    </div>
    <div id="input-area">
      <input id="input" type="text" placeholder="Ex: Historique de la plaque AB-123-CD..." />
      <button id="send">Envoyer</button>
    </div>
  </div>

  <script>
    const input    = document.getElementById('input');
    const sendBtn  = document.getElementById('send');
    const messages = document.getElementById('messages');
    let history    = [];  // réinitialisé à chaque rechargement de page

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      if (type === 'bot') {
        div.innerHTML = marked.parse(text);
      } else {
        div.textContent = text;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      sendBtn.disabled = true;

      try {
        const res  = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, history })
        });
        const data = await res.json();
        if (data.history) history = data.history;
        if (!res.ok) {
          addMessage(data.detail, 'alert');
        } else {
          addMessage(data.reply, 'bot');
        }
      } catch (e) {
        addMessage('Erreur de connexion au serveur.', 'alert');
      }

      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    // Polling alertes MQTT toutes les 5 secondes
    let lastCount = 0;
    setInterval(async () => {
      const res  = await fetch('/detections');
      const data = await res.json();
      if (data.length > lastCount) {
        const det = data[data.length - 1];
        addMessage(`ALERTE : Plaque ${det.plate} détectée en temps réel (${det.lat}, ${det.lon})`, 'alert');
        lastCount = data.length;
      }
    }, 5000);
  </script>
</body>
</html>
